name: "pytest and Docker Build CI/CD   Workflow"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: |
          pytest

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile.api -t gpdurga06093/ecommerce-api:latest .  

      - name: Push Docker image to Docker Hub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin
          docker push $DOCKER_USERNAME/ecommerce-api:latest 

      - name: Deploy to EKS
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
        run: |
          # Check if EKS cluster exists
          if aws eks describe-cluster \
            --name ecommerce-data-platform-dev-cluster \
            --region us-east-2 2>/dev/null; then
            
            aws eks update-kubeconfig \
              --name ecommerce-data-platform-dev-cluster \
              --region us-east-2
            kubectl apply -f kubernetes/deployment.yaml
            kubectl apply -f kubernetes/service.yaml
            kubectl get pods
            echo "Deployed to EKS! ✅"
          else
            echo "EKS cluster not running - skipping deployment"
          fi
